<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AleaSim.Client</title>
    <base href="/" />
    
    <script>
        // Theme initialization to prevent flash
        (function() {
            try {
                var stored = localStorage.getItem('darkMode');
                var isDark = stored === null ? true : (stored === 'true'); // Default to dark
                if (isDark) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                }
            } catch (e) {
                console.warn('Theme init failed', e);
            }
        })();

        window.setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
        };
    </script>

    <style>
        :root {
            --loader-bg: #0f172a;
            --loader-circle: #334155;
            --loader-accent: #a855f7; /* Purple 500 */
            --loader-text: #f8fafc;
        }

        [data-theme="light"] {
            --loader-bg: #f8fafc;
            --loader-circle: #e2e8f0;
            --loader-accent: #7c3aed; /* Violet 600 */
            --loader-text: #0f172a;
        }

        body {
            background-color: var(--loader-bg);
            margin: 0;
            overflow: hidden;
        }

        #app {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-progress {
            width: 80px;
            height: 80px;
        }

        .loading-progress circle {
            fill: none;
            stroke-width: 6;
            stroke-linecap: round;
            cx: 50;
            cy: 50;
            r: 30;
        }

        .loading-progress circle:first-child {
            stroke: var(--loader-circle);
        }

        .loading-progress circle:last-child {
            stroke: var(--loader-accent);
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: spin 1.5s linear infinite;
            transform-origin: center;
        }

        .loading-text {
            margin-top: 20px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--loader-text);
            font-size: 0.9rem;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }

        @keyframes spin {
            0% { stroke-dashoffset: 100; transform: rotate(0deg); }
            50% { stroke-dashoffset: 20; transform: rotate(180deg); }
            100% { stroke-dashoffset: 100; transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>

    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="AleaSim.Client.styles.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress" viewBox="0 0 100 100">
            <circle></circle>
            <circle></circle>
        </svg>
        <div class="loading-text">LOADING CASINO</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/slotEngine.js?v=1.2"></script>
    <script src="js/roulettePro.js?v=1.0"></script>
</body>

</html>
